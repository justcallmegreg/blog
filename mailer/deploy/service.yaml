apiVersion: v1
kind: Service
metadata:
  name: mailer
  namespace: app-mailer
  labels: { app: mailer }
spec:
  type: ClusterIP          # internal only — no ingress, reachable in-cluster as
  selector: { app: mailer } # mailer.app-mailer.svc:8080
  ports:
    - name: http
      port: 8080
      targetPort: 8080
