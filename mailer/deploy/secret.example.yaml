# Copy to your GitOps repo as a real Secret (or a SealedSecret / external-secret).
# Never commit real credentials. `envFrom` exposes every key below as an env var.
apiVersion: v1
kind: Secret
metadata:
  name: mailer-secrets
  namespace: app-mailer
type: Opaque
stringData:
  AWS_REGION: "eu-central-1"
  AWS_ACCESS_KEY_ID: "AKIA..."             # IAM user with the policy in README.md
  AWS_SECRET_ACCESS_KEY: "..."
  MAIL_FROM: "GregCo <noreply@justcallmegreg.io>"   # verified SES sender
  MAIL_OWNER: "greg@justcallmegreg.io"              # where owner notifications go
  SES_CONTACT_LIST: "blog-subscribers"
  SES_TOPIC: "weekly-digest"
