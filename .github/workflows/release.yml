name: release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  # 1) Bump VERSION.txt + tag on main, expose the version + image name.
  prepare:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      IS_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'major') }}
      IS_PATCH: ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}
    outputs:
      version: ${{ steps.ver.outputs.next }}
      major: ${{ steps.ver.outputs.major }}
      minor: ${{ steps.ver.outputs.minor }}
      sha: ${{ steps.commit.outputs.sha }}
      image: ${{ steps.img.outputs.name }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Push the version-bump commit/tag to protected main as the repo owner
          # (admin → bypasses the ruleset); the default GITHUB_TOKEN can't.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Compute next release version
        id: ver
        run: |
          set -euo pipefail
          # Base the release on the last published tag (the real release history),
          # NOT VERSION.txt — PR-preview commits bump VERSION.txt's patch, and that
          # inflation would otherwise leak into a patch-release (minor/major reset
          # the patch so they were unaffected). Fall back to VERSION.txt for the
          # very first release, when no tags exist yet.
          CUR=$(git tag -l 'v*.*.*' | sed 's/^v//' | sort -V | tail -1)
          CUR=${CUR:-$(tr -d '[:space:]' < VERSION.txt)}
          if [ "$IS_MAJOR" = "true" ]; then MODE=major;
          elif [ "$IS_PATCH" = "true" ]; then MODE=patch-release;
          else MODE=minor; fi
          NEXT=$(node scripts/next-version.mjs "$CUR" "$MODE")
          IFS=. read -r MAJ MIN PAT <<< "$NEXT"
          {
            echo "next=$NEXT"
            echo "major=$MAJ"
            echo "minor=$MAJ.$MIN"
          } >> "$GITHUB_OUTPUT"
          echo "release $CUR -> $NEXT (mode=$MODE)"

      - name: Commit VERSION.txt + tag on main
        id: commit
        run: |
          set -euo pipefail
          NEXT="${{ steps.ver.outputs.next }}"
          echo "$NEXT" > VERSION.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION.txt
          # The merged PR may already carry NEXT in VERSION.txt (version.yml's
          # per-commit preview bump), leaving nothing to commit — tag the merge
          # commit directly instead of failing on an empty commit.
          if git diff --cached --quiet; then
            echo "VERSION.txt already at $NEXT — tagging the current commit"
          else
            git commit -m "chore(release): v$NEXT [version-bump] [skip ci]"
          fi
          git tag -a "v$NEXT" -m "v$NEXT"
          git push origin HEAD:main
          git push origin "v$NEXT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Image name (lowercased)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  # 2) Build each arch on a NATIVE runner (no QEMU) and push by digest (untagged).
  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout main (bumped)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            SOURCE_COMMIT=${{ needs.prepare.outputs.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.sha }}
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Artifact-safe platform name
        id: pname
        run: echo "name=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.pname.outputs.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # 3) Merge the per-arch digests into the moving tags, push the chart, cut the Release.
  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (bumped)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest with moving tags
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          IMAGE='${{ needs.prepare.outputs.image }}'
          docker buildx imagetools create \
            -t "$IMAGE:${{ needs.prepare.outputs.version }}" \
            -t "$IMAGE:${{ needs.prepare.outputs.minor }}" \
            -t "$IMAGE:${{ needs.prepare.outputs.major }}" \
            -t "$IMAGE:latest" \
            $(printf "$IMAGE@sha256:%s " *)
          docker buildx imagetools inspect "$IMAGE:${{ needs.prepare.outputs.version }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Package + push Helm chart to GHCR (OCI)
        id: chart
        run: |
          set -euo pipefail
          NEXT="${{ needs.prepare.outputs.version }}"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          # Version the chart + appVersion to the release so `helm install` defaults
          # the image tag (image.tag -> .Chart.AppVersion) to this version.
          helm dependency build helm/blog-engine
          helm package helm/blog-engine --version "$NEXT" --app-version "$NEXT" -d /tmp/chart
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "/tmp/chart/blog-engine-${NEXT}.tgz" "oci://ghcr.io/${OWNER}/charts"
          {
            echo "tgz=/tmp/chart/blog-engine-${NEXT}.tgz"
            echo "repo=ghcr.io/${OWNER}/charts/blog-engine"
          } >> "$GITHUB_OUTPUT"

      - name: GitHub Release (attach chart .tgz)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          append_body: true
          files: ${{ steps.chart.outputs.tgz }}
          body: |
            **Container image:** `${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}` (linux/amd64 + linux/arm64)
            **Helm chart (OCI):** `oci://${{ steps.chart.outputs.repo }}:${{ needs.prepare.outputs.version }}`

            Install the chart:
            ```
            helm install blog oci://${{ steps.chart.outputs.repo }} --version ${{ needs.prepare.outputs.version }}
            ```
