name: release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      IS_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'major') }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # The version-bump commit/tag is pushed to the protected `main`. The
          # default GITHUB_TOKEN (github-actions[bot]) is NOT an admin and can't
          # bypass the branch ruleset, and a personal repo can't add the Actions
          # app to the bypass list. So push as the repo owner via a PAT
          # (RELEASE_TOKEN, contents:write) — the owner is an admin and bypasses.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Compute next release version
        id: ver
        run: |
          set -euo pipefail
          CUR=$(tr -d '[:space:]' < VERSION.txt)
          if [ "$IS_MAJOR" = "true" ]; then MODE=major; else MODE=minor; fi
          NEXT=$(node scripts/next-version.mjs "$CUR" "$MODE")
          IFS=. read -r MAJ MIN PAT <<< "$NEXT"
          {
            echo "next=$NEXT"
            echo "major=$MAJ"
            echo "minor=$MAJ.$MIN"
          } >> "$GITHUB_OUTPUT"
          echo "release $CUR -> $NEXT (mode=$MODE)"

      - name: Commit VERSION.txt + tag on main
        id: commit
        run: |
          set -euo pipefail
          NEXT="${{ steps.ver.outputs.next }}"
          echo "$NEXT" > VERSION.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION.txt
          git commit -m "chore(release): v$NEXT [version-bump] [skip ci]"
          git tag -a "v$NEXT" -m "v$NEXT"
          git push origin HEAD:main
          git push origin "v$NEXT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Image name (lowercased)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch with moving tags
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.ver.outputs.next }}
            ${{ steps.img.outputs.name }}:${{ steps.ver.outputs.minor }}
            ${{ steps.img.outputs.name }}:${{ steps.ver.outputs.major }}
            ${{ steps.img.outputs.name }}:latest
          build-args: |
            SOURCE_COMMIT=${{ steps.commit.outputs.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.next }}
            org.opencontainers.image.revision=${{ steps.commit.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Package + push Helm chart to GHCR (OCI)
        id: chart
        run: |
          set -euo pipefail
          NEXT="${{ steps.ver.outputs.next }}"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          # Version the chart + its appVersion to the release, so `helm install`
          # defaults the image tag (image.tag -> .Chart.AppVersion) to this version.
          helm dependency build helm/blog-engine
          helm package helm/blog-engine --version "$NEXT" --app-version "$NEXT" -d /tmp/chart
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "/tmp/chart/blog-engine-${NEXT}.tgz" "oci://ghcr.io/${OWNER}/charts"
          {
            echo "tgz=/tmp/chart/blog-engine-${NEXT}.tgz"
            echo "repo=ghcr.io/${OWNER}/charts/blog-engine"
          } >> "$GITHUB_OUTPUT"
          echo "Published chart: oci://ghcr.io/${OWNER}/charts/blog-engine:${NEXT}"

      - name: GitHub Release (attach chart .tgz)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.next }}
          name: v${{ steps.ver.outputs.next }}
          generate_release_notes: true
          append_body: true
          files: ${{ steps.chart.outputs.tgz }}
          body: |
            **Container image:** `${{ steps.img.outputs.name }}:${{ steps.ver.outputs.next }}`
            **Helm chart (OCI):** `oci://${{ steps.chart.outputs.repo }}:${{ steps.ver.outputs.next }}`

            Install the chart:
            ```
            helm install blog oci://${{ steps.chart.outputs.repo }} --version ${{ steps.ver.outputs.next }}
            ```
