name: mailer

on:
  pull_request:
    paths: ['mailer/**', '.github/workflows/mailer.yml']
  push:
    branches: [main]
    paths: ['mailer/**', '.github/workflows/mailer.yml']

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mailer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -q

  build:
    # Only publish on merges to main; PRs just run tests.
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./mailer
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/blog-mailer:latest
            ghcr.io/${{ github.repository_owner }}/blog-mailer:${{ github.sha }}
