{{- if .Values.digest.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-digest
  labels: { app: {{ .Release.Name }} }
spec:
  schedule: {{ .Values.digest.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: digest
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["python", "-m", "app.digest"]
              env:
                {{- range $k, $v := .Values.env }}
                - name: {{ $k }}
                  value: {{ $v | quote }}
                {{- end }}
                - name: SUMMARY_DAYS
                  value: {{ .Values.digest.summaryDays | quote }}
                - name: SITE_TITLE
                  value: {{ .Values.digest.siteTitle | quote }}
                - name: BLOG_RSS_URL
                  value: {{ .Values.digest.rssUrl | quote }}
              {{- if .Values.secret.existingSecret }}
              envFrom:
                - secretRef:
                    name: {{ .Values.secret.existingSecret }}
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
{{- end }}
