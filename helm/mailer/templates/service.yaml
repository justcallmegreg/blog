apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels: { app: {{ .Release.Name }} }
spec:
  type: ClusterIP        # internal only — reachable as {{ .Release.Name }}.<ns>.svc:{{ .Values.service.port }}
  selector: { app: {{ .Release.Name }} }
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
