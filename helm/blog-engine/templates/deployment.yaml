apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "blog-engine.fullname" . }}
  labels:
    {{- include "blog-engine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "blog-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Includes the matomo host + toggle so the auto-defaulted analytics.matomoUrl
        # (computed in the ConfigMap) also rolls pods when it changes.
        checksum/config: {{ list (.Values.config | toYaml) (.Values.matomo.enabled | toString) .Values.matomo.ingress.host | join "|" | sha256sum }}
      labels:
        {{- include "blog-engine.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "blog-engine.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: blog
          image: {{ include "blog-engine.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 4321
          envFrom:
            - secretRef:
                name: {{ include "blog-engine.secretName" . }}
          volumeMounts:
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /tmp/content-cache
          startupProbe:
            httpGet:
              path: /version
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /version
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /version
              port: http
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "blog-engine.fullname" . }}
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
