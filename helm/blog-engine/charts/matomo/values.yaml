# Defaults for the Matomo subchart. Overridden under `matomo:` in the umbrella values.
enabled: false

image:
  repository: matomo
  tag: "5"
  pullPolicy: IfNotPresent

service:
  port: 80

persistence:
  size: 5Gi
  storageClass: ""

resources: {}

ingress:
  enabled: false
  className: ""
