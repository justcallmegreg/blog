apiVersion: v1
kind: Service
metadata:
  name: {{ include "matomo.mariadb.fullname" . }}
  labels:
    app.kubernetes.io/name: matomo-mariadb
    {{- include "matomo.labels" . | nindent 4 }}
spec:
  # Headless: this is the StatefulSet's governing Service (serviceName), which
  # must be clusterIP: None. Matomo resolves the single DB pod via this name.
  clusterIP: None
  ports:
    - port: 3306
      targetPort: mysql
      name: mysql
      protocol: TCP
  selector:
    app.kubernetes.io/name: matomo-mariadb
    app.kubernetes.io/instance: {{ .Release.Name }}
