site:
  title: "GregCo Industries Unified Operating System"
  description: "Personal log"
  # baseUrl: "https://blog.example.com"   # optional
content:
  repo: "https://github.com/you/blog-content.git"
  branch: "main"
  subdir: ""                # optional: content lives in a subfolder of the repo
  syncIntervalSeconds: 300
effects:
  matrixRain: true
  matrixRainDurationSeconds: 7      # matrix runs this long on the index, then fades out
  typewriter: true
  clickSound: true          # default ON; readers get a persisted mute toggle
  crtGlitch: true                   # periodic light CRT beam-roll (horizontal sweep) on every page
  crtGlitchIntervalSeconds: 15      # roughly how often it sweeps (±jitter)
  vaultBoy: true                    # decorative Vault Boy GIF in the bottom-right corner
  vaultBoyLoops: 3                  # number of times the GIF loops, then freezes on its last frame (0 = infinite)
github:
  username: "justcallmegreg"        # GitHub user summarized on the Contributions tab
  # Optional: set a GITHUB_TOKEN env var to raise API rate limits (not stored here).

# The HTTP port/host are set via the PORT and HOST environment variables
# (see Dockerfile / docker-compose.yml), not in this file. Change the published
# port through the compose `ports:` mapping.
