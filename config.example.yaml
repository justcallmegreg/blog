site:
  title: "GregCo Industries Unified Operating System"
  description: "Personal log"
  # baseUrl: "https://blog.example.com"   # optional
content:
  repo: "https://github.com/you/blog-content.git"
  branch: "main"
  subdir: ""                # optional: content lives in a subfolder of the repo
  syncIntervalSeconds: 300
effects:
  matrixRain: true
  matrixRainDurationSeconds: 7      # matrix runs this long on the index, then fades out
  typewriter: true
  clickSound: true          # default ON; readers get a persisted mute toggle
  crtGlitch: true                   # periodic light CRT beam-roll (horizontal sweep) on every page
  crtGlitchIntervalSeconds: 15      # roughly how often it sweeps (±jitter)
  vaultBoy: true                    # decorative Vault Boy GIF in the bottom-right corner
  vaultBoyLoops: 3                  # number of times the GIF loops, then freezes on its last frame (0 = infinite)
github:
  username: "justcallmegreg"        # GitHub user summarized on the Contributions tab
  # Optional: set a GITHUB_TOKEN env var to raise API rate limits (not stored here).
contact:
  enabled: true                     # show the Contact tab + form
  captcha: true                     # require the slide-puzzle captcha before sending (needs images in public/puzzles/)
  # Where APPROVE sends the JSON payload — set as the CONTACT_WEBHOOK_URL env
  # var (it often embeds a secret token, so it is NOT stored here). If unset,
  # submissions are logged server-side (stage mode) and still report success.
social:                             # top-bar social links (handles only; empty string hides a link)
  github: "justcallmegreg"
  linkedin: "justcallmegreg"
  medium: ""                        # e.g. "@justcallmegreg" — shown when set

about:
  enabled: true
  headline: "Greg — software engineer"
  bio: "Short background summary — who I am, what I work on."
  projects:
    - start: 2021
      end: 2023
      description: "Confidential project — what it was (no client name)."
      responsibilities: "What I owned / led."
      deliveries: "What I shipped / achieved."
  # CV requests are sent to the CV_WEBHOOK_URL env var (not stored here);
  # stage-mode logs the request when unset.

# The HTTP port/host are set via the PORT and HOST environment variables
# (see Dockerfile / docker-compose.yml), not in this file. Change the published
# port through the compose `ports:` mapping.
privacy:
  email: "privacy@example.com"   # shown for GDPR data-erasure requests; empty hides the line
  consentBanner: true            # first-visit "accept data processing" gate (stored in a cookie)
analytics:
  enabled: false                       # set true once Matomo is reachable
  matomoUrl: "https://analytics.example.com"   # your Matomo base URL (no trailing /matomo.php)
  siteId: 1                            # the Matomo site id for this blog
newsletter:
  enabled: true
  summaryDays: 7                       # "best posts from the last N days"
  timezone: "CET"                      # timezone abbreviation shown in the modal blurb (e.g. CET, EST)
  schedule: "every Monday ~09:00"      # shown in the modal blurb
  # Subscribe/unsubscribe POST to the NEWSLETTER_SUBSCRIBE_WEBHOOK_URL /
  # NEWSLETTER_UNSUBSCRIBE_WEBHOOK_URL env vars (not stored here). Stage-mode
  # logs the request when a URL is unset. Captcha reuses contact.captcha.
